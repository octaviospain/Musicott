name: master build

on:
    push:
        branches:
            - master
        paths-ignore:
            - "**.md"
            - '.gitignore'
            - 'docs/**'

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}

        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Set up JDK 24 (Liberica + JavaFX)
                uses: actions/setup-java@v4
                with:
                    java-version: '24'
                    distribution: 'liberica'
                    java-package: 'jdk+fx'

            # GStreamer is what JavaFX media plays through on Linux; without these
            # packages javafx.media tests crash on first MediaPlayer construction.
            # Xvfb provides a virtual X display for any test that bypasses Monocle's
            # headless mode. Windows + macOS bundle their media stack in the JDK.
            -   name: Install Linux runtime deps
                if: matrix.os == 'ubuntu-latest'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                      libgstreamer1.0-0 \
                      gstreamer1.0-plugins-base \
                      gstreamer1.0-plugins-good \
                      gstreamer1.0-plugins-bad \
                      gstreamer1.0-libav \
                      gstreamer1.0-tools \
                      libgstreamer-plugins-base1.0-dev \
                      xvfb
                    export DISPLAY=:99.0
                    Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
                    echo "DISPLAY=:99.0" >> $GITHUB_ENV

            -   name: Cache SonarQube packages
                if: matrix.os == 'ubuntu-latest'
                uses: actions/cache@v4
                with:
                    path: ~/.sonar/cache
                    key: ${{ runner.os }}-sonar
                    restore-keys: ${{ runner.os }}-sonar

            -   name: Cache Gradle packages
                uses: actions/cache@v4
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: Build
                shell: bash
                run: ./gradlew check

            # Only the Linux leg uploads artifacts and runs Sonar — installer
            # artifacts come from release.yml; SonarCloud needs a single canonical
            # source per project.
            -   name: Upload Artifacts
                if: matrix.os == 'ubuntu-latest'
                uses: actions/upload-artifact@v4
                with:
                    name: release-build-libs
                    path: build/libs
                    retention-days: 14
                    overwrite: true

            -   name: SonarQube Scan
                if: matrix.os == 'ubuntu-latest'
                env:
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                run: ./gradlew sonar --info
