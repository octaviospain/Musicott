name: branch / PR build

on:
    push:
        branches-ignore:
            - master
        paths-ignore:
            - "**.md"
            - '.gitignore'
            - 'docs/**'
concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}

        steps:
            -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
                with:
                    fetch-depth: 0
                    persist-credentials: false

            -   name: Set up JDK 24 (Liberica + JavaFX)
                uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
                with:
                    java-version: 24
                    distribution: 'liberica'
                    java-package: 'jdk+fx'

            # GStreamer is what JavaFX media plays through on Linux; without these
            # packages javafx.media tests crash on first MediaPlayer construction.
            # Xvfb provides a virtual X display for any test that bypasses Monocle's
            # headless mode. Windows + macOS bundle their media stack in the JDK.
            -   name: Install Linux runtime deps
                if: matrix.os == 'ubuntu-latest'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                      libgstreamer1.0-0 \
                      gstreamer1.0-plugins-base \
                      gstreamer1.0-plugins-good \
                      gstreamer1.0-plugins-bad \
                      gstreamer1.0-libav \
                      gstreamer1.0-tools \
                      libgstreamer-plugins-base1.0-dev \
                      xvfb
                    export DISPLAY=:99.0
                    Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
                    sleep 2
                    echo "DISPLAY=:99.0" >> $GITHUB_ENV

            -   name: Cache Gradle packages
                uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: Build
                shell: bash
                run: ./gradlew check

            -   name: Cross-check verification metadata against Maven Central
                # Re-resolves every dependency with --refresh-dependencies (bypasses the
                # cache restored above) and writes a fresh dependency-verification report
                # to verification-metadata.dryrun.xml. Two outcomes:
                #   1. Gradle's own dependency-verification rejects a freshly-downloaded
                #      artifact whose SHA does not match the committed metadata — fails here.
                #   2. The dry-run output diverges from the committed file (new components,
                #      reordering, missing entries) — flagged by the diff below.
                # Together these prove the committed metadata matches what Maven Central
                # currently serves, defeating a poisoned-local-cache attack at regen time.
                # --dry-run resolves dependencies without executing tests, so this stays cheap.
                shell: bash
                run: |
                    ./gradlew --write-verification-metadata sha256 build cyclonedxBom \
                        --dry-run --no-parallel --refresh-dependencies
                    if ! diff -q gradle/verification-metadata.xml gradle/verification-metadata.dryrun.xml > /dev/null; then
                        echo "::error::verification-metadata.xml diverges from Maven Central. Regenerate locally and recommit."
                        diff gradle/verification-metadata.xml gradle/verification-metadata.dryrun.xml || true
                        exit 1
                    fi
                    rm gradle/verification-metadata.dryrun.xml
