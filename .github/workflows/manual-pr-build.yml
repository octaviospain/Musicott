name: Manual PR Build
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to build'
        required: true
        type: number
permissions:
  contents: read
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: refs/pull/${{ github.event.inputs.pr_number }}/merge
          fetch-depth: 0
          persist-credentials: false
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 25
          distribution: 'liberica'
          java-package: 'jdk+fx'
      # GStreamer backs javafx.media on Linux and Xvfb provides a virtual display for
      # tests that bypass Monocle's headless mode — same runtime deps as the branch/PR build.
      - name: Install Linux runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-libav \
            gstreamer1.0-tools \
            libgstreamer-plugins-base1.0-dev \
            xvfb
          export DISPLAY=:99.0
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          sleep 2
          echo "DISPLAY=:99.0" >> $GITHUB_ENV
      - name: Cache Gradle packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Build with Gradle
        run: ./gradlew build
      - name: Cross-check verification metadata against Maven Central
        # Re-resolves every dependency with --refresh-dependencies (bypasses the cache
        # restored above) and writes a fresh report to verification-metadata.dryrun.xml.
        # Fails if Gradle rejects a freshly-downloaded artifact whose SHA does not match
        # the committed metadata, or if the dry-run output diverges from the committed file.
        # --dry-run resolves dependencies without executing tests, so this stays cheap.
        shell: bash
        run: |
          ./gradlew --write-verification-metadata sha256 build cyclonedxBom \
              --dry-run --no-parallel --refresh-dependencies
          if ! diff -q gradle/verification-metadata.xml gradle/verification-metadata.dryrun.xml > /dev/null; then
              echo "::error::verification-metadata.xml diverges from Maven Central. Regenerate locally and recommit."
              diff gradle/verification-metadata.xml gradle/verification-metadata.dryrun.xml || true
              exit 1
          fi
          rm gradle/verification-metadata.dryrun.xml
