import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinJvmCompile

plugins {
    id 'application'
    id 'idea'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'java'
    id 'java-test-fixtures'
    id 'jacoco'
    id 'org.jetbrains.kotlin.jvm' version '2.3.20'
    id 'org.jetbrains.kotlin.plugin.serialization' version '2.3.20'
    id 'org.jetbrains.kotlin.plugin.spring' version '2.3.20'
    id 'org.sonarqube' version '7.2.3.7755'
    id 'org.springframework.boot' version '4.0.5'
    id 'pl.allegro.tech.build.axion-release' version '1.21.1'
}

repositories {
    mavenLocal()
    mavenCentral()
}

ext {
    kotlinVersion = '2.3.20'
    kotestVersion = '5.9.1'
    lirpVersion = '2.4.0'
    musicCommonsVersion = '0.5.0-fix-fxplaylist-cover-init-SNAPSHOT'

    testJvmArgs = [
            '--enable-native-access=javafx.graphics',
            '--add-exports=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED',
            '--add-exports=javafx.graphics/com.sun.glass.utils=ALL-UNNAMED',
            '--add-exports=javafx.graphics/com.sun.glass.ui.monocle=ALL-UNNAMED',
            '--add-exports=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED',
            '--add-exports=javafx.graphics/com.sun.javafx.util=ALL-UNNAMED',
            '--add-exports=javafx.base/com.sun.javafx.reflect=ALL-UNNAMED',
            '--add-exports=javafx.base/com.sun.javafx.beans=ALL-UNNAMED',
            '--add-exports=javafx.base/com.sun.javafx.event=ALL-UNNAMED',
            '--add-exports=javafx.base/com.sun.javafx.logging=ALL-UNNAMED',
            '--add-opens=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED',
            '--add-opens=javafx.graphics/com.sun.glass.ui.monocle=ALL-UNNAMED',
            '--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED',
            '--add-opens=javafx.graphics/com.sun.javafx.util=ALL-UNNAMED',
            '--add-opens=javafx.graphics/javafx.scene.image=ALL-UNNAMED',
            '--add-opens=javafx.base/com.sun.javafx.reflect=ALL-UNNAMED',
            '--add-opens=javafx.base/com.sun.javafx.beans=ALL-UNNAMED',
            '--add-opens=javafx.base/com.sun.javafx.event=ALL-UNNAMED',
            '--add-opens=javafx.base/com.sun.javafx.logging=ALL-UNNAMED',
            '--add-opens=javafx.base/javafx.beans=ALL-UNNAMED',
            '--add-opens=javafx.base/javafx.beans.property=ALL-UNNAMED',
            '--add-opens=javafx.base/javafx.collections=ALL-UNNAMED',
    ]

    configureTestFxSystemProperties = { Test task ->
        if (System.getProperty('testfx.headless') == 'false') {
            task.systemProperty 'testfx.robot', 'awt'
            task.systemProperty 'java.awt.headless', 'false'
        } else {
            task.systemProperty 'testfx.headless', 'true'
            task.systemProperty 'java.awt.headless', 'true'
            task.systemProperty 'testfx.robot', 'glass'
            task.systemProperty 'prism.order', 'sw'
            task.systemProperty 'prism.text', 't2k'
            task.systemProperty 'glass.platform', 'Gtk'
            task.systemProperty 'monocle.platform', 'Headless'
        }
    }
}

dependencies {
    api "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
    implementation 'org.apache.commons:commons-lang3:3.20.0'
    implementation 'com.fasterxml.jackson.core:jackson-core:2.21.2'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.21'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.21.2'
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-xml:2.21.2'
    implementation 'com.google.guava:guava:33.5.0-jre'
    implementation 'com.neovisionaries:nv-i18n:1.29'
    implementation 'commons-io:commons-io:2.21.0'
    implementation 'de.codecentric.centerdevice:centerdevice-nsmenufx:2.1.7'
    implementation 'io.github.microutils:kotlin-logging-jvm:3.0.5'
    implementation 'jakarta.annotation:jakarta.annotation-api:3.0.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.1'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-javafx:1.10.1'
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.10.0'
    implementation 'net.jthink:jaudiotagger:3.0.1'
    implementation 'net.rgielen:javafx-weaver-core:2.0.1'
    implementation 'net.rgielen:javafx-weaver-spring:2.0.1'
    implementation "net.transgressoft:music-commons-api:$musicCommonsVersion"
    implementation "net.transgressoft:music-commons-core:$musicCommonsVersion"
    implementation "net.transgressoft:music-commons-fx:$musicCommonsVersion"
    implementation "net.transgressoft:lirp-core:$lirpVersion"
    implementation 'org.apache.commons:commons-lang3:3.20.0'
    implementation 'org.apache.poi:poi-ooxml:5.5.1'
    implementation 'org.controlsfx:controlsfx:11.2.3'
    implementation 'org.fxmisc.easybind:easybind:1.0.3'
    implementation 'org.springframework.boot:spring-boot'
    implementation 'org.springframework.boot:spring-boot-starter-logging'
    implementation 'org.yaml:snakeyaml:2.2'

    implementation platform("org.jetbrains.kotlin:kotlin-bom:$kotlinVersion")
    implementation "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    api "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"

    testFixturesImplementation "net.transgressoft:music-commons-test:$musicCommonsVersion"
    testFixturesImplementation "net.transgressoft:music-commons-fx-test:$musicCommonsVersion"
    testFixturesImplementation 'org.hamcrest:hamcrest:3.0'
    testFixturesImplementation 'org.mockito:mockito-core:5.23.0'
    testFixturesImplementation 'org.testfx:testfx-junit5:4.0.18'
    testFixturesImplementation 'org.testfx:testfx-core:4.0.18'
    testFixturesImplementation 'org.testfx:openjfx-monocle:21.0.2'
    testFixturesImplementation 'org.springframework.boot:spring-boot-starter-test'
    testFixturesImplementation(platform('org.junit:junit-bom:6.0.3'))
    testFixturesImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-test:1.10.1'
    testFixturesImplementation('org.junit.jupiter:junit-jupiter')

    testImplementation testFixtures(project)
    testImplementation "net.transgressoft:music-commons-test:$musicCommonsVersion"
    testImplementation "net.transgressoft:music-commons-fx-test:$musicCommonsVersion"
    testImplementation 'org.hamcrest:hamcrest:3.0'
    testImplementation 'org.mockito:mockito-core:5.23.0'
    testImplementation 'org.testfx:testfx-junit5:4.0.18'
    testImplementation 'org.testfx:testfx-core:4.0.18'
    testImplementation 'org.testfx:openjfx-monocle:21.0.2'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation(platform('org.junit:junit-bom:6.0.3'))
    testImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-test:1.10.1'
    testImplementation('org.junit.jupiter:junit-jupiter')
}

kotlin {
    jvmToolchain(24)
}

application {
    applicationName = 'musicott'
    mainClass = 'net.transgressoft.musicott.MusicottApplication'

    applicationDefaultJvmArgs = [
            '--enable-native-access=javafx.graphics,ALL-UNNAMED',
            '--add-opens=javafx.controls/javafx.scene.control=ALL-UNNAMED',
            '--add-opens=javafx.controls/javafx.scene.control.skin=ALL-UNNAMED',
            '--add-opens=javafx.graphics/com.sun.javafx.css=ALL-UNNAMED',
            '--add-opens=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED',
            '--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED',
            '--add-exports=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED'
    ]
}

scmVersion {
    tag {
        prefix = 'v'
    }
    useHighestVersion = true
    ignoreUncommittedChanges = false
    versionIncrementer 'incrementMinor'
}

jar {
    enabled = true
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    zip64 = true

    manifest {
        attributes 'Main-Class': 'net.transgressoft.musicott.MusicottApplication'
    }

    from {
        (configurations.runtimeClasspath.findAll { !it.path.endsWith('.pom') }).collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }

    archiveFileName = "Musicott-${scmVersion.version}.jar"

    exclude 'META-INF/*.RSA', 'META-INF/*.SF', 'META-INF/*.DSA'
}

group = 'net.transgressoft'
version = scmVersion.version
description = 'musicott'

configurations.configureEach {
    resolutionStrategy.force 'org.yaml:snakeyaml:2.2'
    resolutionStrategy {
        cacheChangingModulesFor 0, 'seconds'
    }

    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.group == 'org.jetbrains.kotlinx' && details.requested.name.startsWith('kotlinx-coroutines')) {
            details.useVersion('1.10.1')
        }
        if (details.requested.group == 'org.jetbrains.kotlinx' && details.requested.name.startsWith('kotlinx-serialization')) {
            details.useVersion('1.10.0')
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs << '-Xlint:unchecked' << '-Xlint:deprecation'
}

tasks.withType(ProcessResources).configureEach {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

tasks.register('sourceJar', Jar) {
    dependsOn classes
    archiveClassifier.set('sources')
    from sourceSets.main.allSource
    from sourceSets.main.output
}

tasks.register('javadocJar', Jar) {
    dependsOn javadoc
    archiveClassifier.set('javadoc')
    from javadoc.destinationDir
    javadoc.options.addStringOption('Xdoclint:none', '-quiet')
}

tasks.withType(KotlinJvmCompile).configureEach {
    compilerOptions {
        jvmTarget.set(JvmTarget.JVM_24)
        freeCompilerArgs.add('-Xjsr305=strict')
        freeCompilerArgs.add('-Xjvm-default=all')
    }
}

sourceSets {
    integrationTest {
        java.srcDir 'src/integrationTest/java'
        resources.srcDir 'src/integrationTest/resources'
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
    uiTest {
        java.srcDir 'src/uiTest/java'
        resources.srcDir 'src/uiTest/resources'
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
    e2eTest {
        java.srcDir 'src/e2eTest/java'
        resources.srcDir 'src/e2eTest/resources'
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}

idea {
    module {
        testSources.from(
                sourceSets.integrationTest.java.srcDirs,
                sourceSets.uiTest.java.srcDirs,
                sourceSets.e2eTest.java.srcDirs
        )
        testResources.from(
                sourceSets.integrationTest.resources.srcDirs,
                sourceSets.uiTest.resources.srcDirs,
                sourceSets.e2eTest.resources.srcDirs
        )
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
    uiTestImplementation.extendsFrom testImplementation
    uiTestRuntimeOnly.extendsFrom testRuntimeOnly
    e2eTestImplementation.extendsFrom testImplementation
    e2eTestRuntimeOnly.extendsFrom testRuntimeOnly
}

dependencies {
    integrationTestImplementation testFixtures(project)
    uiTestImplementation testFixtures(project)
    e2eTestImplementation testFixtures(project)
}

sonar {
    properties {
        property 'sonar.host.url', 'http://sonar.transgressoft.net'
        property 'sonar.projectKey', 'net.transgressoft:musicott'
        property 'sonar.projectName', 'musicott'
        property 'sonar.projectVersion', version
        property 'sonar.sources', 'src/main'
        property 'sonar.tests', 'src/test,src/integrationTest,src/uiTest,src/e2eTest'
        property 'sonar.exclusions', 'src/test/**,src/integrationTest/**,src/uiTest/**,src/e2eTest/**'
        property 'sonar.coverage.jacoco.xmlReportPaths', 'build/reports/jacoco/test/jacocoTestReport.xml'
        property 'sonar.junit.reportPaths', [
                'build/test-results/test',
                'build/test-results/integrationTest',
                'build/test-results/uiTest',
                'build/test-results/e2eTest'
        ].join(',')
    }
}

// ---------------------------------------------------------------------------
// Test tasks
// ---------------------------------------------------------------------------

test {
    useJUnitPlatform()
    configureTestFxSystemProperties(it)
    testLogging { events "passed", "skipped", "failed" }
    jvmArgs = testJvmArgs
}

tasks.register('integrationTest', Test) {
    description = 'Runs integration tests (*IT classes)'
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    useJUnitPlatform()
    shouldRunAfter tasks.named('test')
    configureTestFxSystemProperties(it)
    testLogging { events "passed", "skipped", "failed" }
    jvmArgs = testJvmArgs
}

tasks.register('uiTest', Test) {
    description = 'Runs UI tests (*UIT classes)'
    group = 'verification'
    testClassesDirs = sourceSets.uiTest.output.classesDirs
    classpath = sourceSets.uiTest.runtimeClasspath
    useJUnitPlatform()
    shouldRunAfter tasks.named('integrationTest')
    configureTestFxSystemProperties(it)
    testLogging { events "passed", "skipped", "failed" }
    jvmArgs = testJvmArgs
}

tasks.register('e2eTest', Test) {
    description = 'Runs end-to-end tests (*E2E classes)'
    group = 'verification'
    testClassesDirs = sourceSets.e2eTest.output.classesDirs
    classpath = sourceSets.e2eTest.runtimeClasspath
    useJUnitPlatform()
    shouldRunAfter tasks.named('uiTest')
    configureTestFxSystemProperties(it)
    testLogging { events "passed", "skipped", "failed" }
    jvmArgs = testJvmArgs
}

jacocoTestReport {
    executionData.setFrom(fileTree(buildDir).include('jacoco/*.exec'))
    sourceDirectories.from(sourceSets.main.allSource.srcDirs)
    classDirectories.from(sourceSets.main.output)
    reports {
        xml.required.set true
        html.required = true
    }
    dependsOn tasks.named('test'), tasks.named('integrationTest'),
              tasks.named('uiTest'), tasks.named('e2eTest')
}

tasks.named('check') {
    dependsOn tasks.named('test')
    dependsOn tasks.named('integrationTest')
    dependsOn tasks.named('uiTest')
    dependsOn tasks.named('e2eTest')
    dependsOn tasks.named('jacocoTestReport', JacocoReport)
}
