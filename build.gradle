import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinJvmCompile

plugins {
    id 'application'
    id 'idea'
    id 'java'
    id 'java-test-fixtures'
    id 'jacoco'
    alias(libs.plugins.kotlin.jvm)
    alias(libs.plugins.kotlin.serialization)
    alias(libs.plugins.kotlin.spring)
    alias(libs.plugins.spring.boot)
    alias(libs.plugins.spring.dependency.management)
    alias(libs.plugins.sonarqube)
    alias(libs.plugins.axion.release)
    alias(libs.plugins.beryx.runtime)
    alias(libs.plugins.jmh)
    alias(libs.plugins.spotless)
    alias(libs.plugins.cyclonedx) apply false
}

// CycloneDX 3.2.4 leaves its internal `cyclonedxDirectBom` configuration consumable, which
// collides with variant-aware classpath resolution while the `check`/`build` task graph is
// configured on Gradle 9 (CycloneDX/cyclonedx-gradle-plugin#821: the configuration is
// "consumed as a variant" before the plugin adds its artifact → "Cannot mutate"). The SBOM
// is only ever produced by an explicit `cyclonedxBom` invocation (CI + the dependency-
// verification regen), so the plugin is applied only when such a task is requested, keeping
// `check`/`build` free of the collision.
if (gradle.startParameter.taskNames.any { it.toLowerCase().contains('cyclonedx') }) {
    apply plugin: 'org.cyclonedx.bom'

    // Scope the SBOM to the runtime classpath — the artifacts that actually ship in the
    // application. Scanning that (rather than every configuration) keeps OSV findings focused
    // on shipped dependencies and avoids false positives from build-tooling transitives that
    // live only in the Gradle daemon.
    tasks.named('cyclonedxDirectBom') {
        includeConfigs = ['runtimeClasspath']
        skipConfigs = ['compileClasspath', 'testCompileClasspath', 'testRuntimeClasspath']
    }
}

// JavaFX is consumed as platform modules from the JDK (BellSoft Liberica Full /
// 'jdk+fx' on CI). The Beryx jpackage step jlinks the javafx.* modules into the
// trimmed runtime — see gradle/packaging.gradle. No org.openjfx classpath JARs.

repositories {
    // No mavenLocal() here: local snapshot testing of net.transgressoft libraries is provided
    // by a scoped `mavenLocal { content { includeGroup 'net.transgressoft' } }` in the developer
    // init script. An unscoped mavenLocal() would shadow Maven Central for third-party deps and
    // make locally-generated dependency-verification metadata diverge from CI (mavenLocal serves
    // .pom but not .module, so .module entries and transitive versions would differ).
    mavenCentral()
}

dependencies {
    api libs.kotlin.stdlib

    implementation platform(libs.kotlin.bom)

    implementation(libs.bundles.music.commons)
    implementation libs.lirp.core
    implementation libs.lirp.sql

    implementation libs.spring.boot
    implementation libs.spring.boot.starter.logging
    // Spring Boot 4.0.5's bare 'spring-boot' artifact does not pull snakeyaml
    // transitively (only spring-boot-starter does). YamlPropertySourceLoader needs
    // it on the classpath at startup to load application.yml; version is managed
    // by the Spring Boot dependency-management plugin.
    implementation libs.snakeyaml

    implementation libs.bundles.javafx.weaver
    implementation libs.controlsfx
    implementation libs.easybind
    implementation libs.nsmenufx

    implementation libs.kotlinx.coroutines.core
    implementation libs.kotlinx.coroutines.javafx
    implementation libs.kotlinx.serialization.json
    implementation libs.kotlin.logging.jvm

    implementation libs.bundles.jackson
    implementation libs.jaudiotagger

    implementation libs.commons.lang3
    implementation libs.commons.io
    implementation libs.nv.i18n
    implementation libs.jakarta.annotation
}

kotlin {
    jvmToolchain(25)
}

scmVersion {
    tag {
        prefix = 'v'
    }
    useHighestVersion = true
    ignoreUncommittedChanges = false
    versionIncrementer 'incrementMinor'
}

group = 'net.transgressoft'
version = scmVersion.version
description = 'musicott'

// Generate META-INF/build-info.properties at build time so Spring's BuildProperties
// bean is autoconfigured. AboutWindowAlert reads buildProperties.getVersion() to
// display the runtime version (sourced from scmVersion.version above) instead of
// a hardcoded literal.
springBoot {
    buildInfo()
}

// Stabilise transitive kotlinx versions — Spring Boot's kotlin BOM and music-commons can
// otherwise pull conflicting coroutines/serialization releases into the runtime classpath.
// Also strip transitive org.openjfx:javafx-* JARs: with Liberica Full / 'jdk+fx' the JDK
// already exposes JavaFX as platform modules and the older 21.x classpath JARs that
// music-commons drags in would otherwise shadow them and trigger 'Unsupported JavaFX
// configuration: classes were loaded from unnamed module' warnings.
configurations.configureEach {
    exclude group: 'org.openjfx'

    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.group == 'org.jetbrains.kotlinx' && details.requested.name.startsWith('kotlinx-coroutines')) {
            details.useVersion('1.11.0')
        }
        if (details.requested.group == 'org.jetbrains.kotlinx' && details.requested.name.startsWith('kotlinx-serialization')) {
            details.useVersion('1.11.0')
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs << '-Xlint:unchecked' << '-Xlint:deprecation'
}

tasks.withType(ProcessResources).configureEach {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

tasks.withType(KotlinJvmCompile).configureEach {
    compilerOptions {
        jvmTarget.set(JvmTarget.JVM_25)
        freeCompilerArgs.add('-Xjsr305=strict')
        freeCompilerArgs.add('-Xjvm-default=all')
    }
}

jmh {
    jvmArgs        = ['-Xmx2g', '-XX:+UseCompactObjectHeaders']
    fork           = 1
    warmupIterations = 1
    iterations     = 3
    resultFormat   = 'JSON'
    resultsFile    = layout.buildDirectory.file("reports/jmh/results.json").get().asFile
    // 'jfr' captures a per-benchmark flight recording alongside the gc profiler for
    // allocation-hotspot analysis; results land under build/reports/jmh and a profile.jfr
    // directory per benchmark.
    profilers      = ['gc', 'jfr']
}

/**
 * Regenerates the dependency-verification ledger from a clean slate so stale/superseded artifact entries are pruned.
 *
 * Gradle merges `--write-verification-metadata` output into the existing `gradle/verification-metadata.xml` file,
 * so an append-then-prune approach leaves stale entries in place. Emptying only the `<components>` element first
 * (while preserving `<configuration>`, including `verify-metadata` and `trusted-artifacts`) guarantees the
 * resulting ledger contains exactly the currently-resolved set — nothing more, nothing less.
 *
 * Run with: `gradle regenerateVerificationMetadata`
 */
tasks.register('regenerateVerificationMetadata', Exec) {
    group = 'verification'
    description = 'Regenerates the dependency-verification ledger from a clean slate so stale/superseded artifact entries are pruned.'

    doFirst {
        def xmlFile = rootProject.file('gradle/verification-metadata.xml')
        if (!xmlFile.exists()) {
            logger.lifecycle('verification-metadata.xml not found — skipping component clear.')
            return
        }
        def content = xmlFile.text
        // Remove all children of <components> while leaving the element itself, then replace with empty tag.
        // This preserves the <configuration> block (verify-metadata / trusted-artifacts) intact.
        def cleared = content.replaceAll(/(?s)<components>.*?<\/components>/, '<components/>')
        xmlFile.text = cleared
        logger.lifecycle('Cleared <components> in verification-metadata.xml; <configuration> block preserved.')
    }

    commandLine 'gradle', 'clean', 'build', 'cyclonedxBom',
            '--write-verification-metadata', 'sha256',
            '--refresh-dependencies',
            '--no-parallel'
}

apply from: 'gradle/test-suites.gradle'
apply from: 'gradle/packaging.gradle'
apply from: 'gradle/sonar.gradle'
apply from: 'gradle/spotless.gradle'
